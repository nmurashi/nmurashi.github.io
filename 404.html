<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found</title>
    <link rel="stylesheet" href="style.css">
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 1.5rem;
      }
      .box { max-width: 480px; }
      h1 {
        font-family: var(--serif);
        font-size: clamp(4rem, 10vw, 6rem);
        font-weight: 400;
        color: var(--bright);
        line-height: 1;
        margin-bottom: 0.75rem;
      }
      p#message {
        font-size: 1.1rem;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }
      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 1rem;
        font-weight: 500;
        border-bottom: 1px solid var(--accent);
        padding-bottom: 2px;
      }
      .home-link:hover { text-decoration: none; border-bottom-color: transparent; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>404</h1>
      <p id="message">That page doesn't exist.</p>
      <a href="/" class="home-link">
        Go home
        <svg class="icon-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
      </a>
    </div>

    <script>
      // Add the exact, correctly-cased path segment for each project site here.
      // Only paths in this list get case-corrected; anything else is a real 404.
      var KNOWN_PATHS = ['KUCI-thing'];

      (function () {
        var pathname = window.location.pathname;
        var segments = pathname.split('/').filter(Boolean);
        if (segments.length === 0) return;

        var requested = segments[0];
        var match = KNOWN_PATHS.find(function (known) {
          return known.toLowerCase() === requested.toLowerCase();
        });

        if (match && match !== requested) {
          segments[0] = match;
          var target = '/' + segments.join('/') + '/' + window.location.search + window.location.hash;
          document.getElementById('message').textContent = 'Redirecting to the correct page...';
          window.location.replace(target);
        }
      })();
    </script>
  </body>
</html>
